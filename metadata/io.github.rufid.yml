Builds:
  - versionName: 0.2.0
    versionCode: 4
    commit: e1987355a6d7e3f523dd1546e1fff7051c2bae97
    subdir: app
    sudo:
      - apt-get update
      - apt-get install -y --no-install-recommends autoconf automake clang cmake cpio
        dosfstools file flex g++ libgcrypt20-dev libgpg-error-dev libtool libtool-bin lld llvm make
        mingw-w64 mtools nasm ninja-build p7zip-full patch perl pkg-config
    gradle:
      - yes
    prebuild: sdkmanager "platforms;android-35" "build-tools;35.0.0"
    build:
      - export PATH=$PATH:/usr/sbin
      - bash ../scripts/fdroid/stage-source-payloads.sh
    ndk: r29
    gradleprops:
      - rufid.includePayloads=true

MaintainerNotes: |-
  Payloads must not be extracted from any opaque APK. FreeDOS uses the official
  FreeDOS 1.4 LiteUSB archive only as a verified package/source input; the
  staged FAT16 image is assembled from source-built FreeDOS kernel, FreeCOM,
  SYS, and boot sector artifacts, with package-source audit records kept outside
  the APK. UEFI:NTFS, wimlib, and NTFS-3G (mkntfs + Rufid stream tool) are built
  from pinned upstream source paths. 7-Zip-JBinding is built from pinned upstream
  source with RAR/unRAR native sources excluded from the Android CMake input.
  NTFS-3G git has no generated configure; autogen/autoreconf needs AM_PATH_LIBGCRYPT
  from libgcrypt20-dev (and libgpg-error-dev). Crypto remains disabled at configure
  time (--disable-crypto); the m4 macro is still required to generate configure.
  Native builds use ANDROID_NDK_HOME from the F-Droid ndk: field (currently r29).

